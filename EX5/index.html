<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex#5 基礎打字機</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f8f9fa;
        }
        #container {
            font-size: 3rem;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100px;
            min-width: 80%;
            border: 2px solid #333;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            word-break: break-all; /* 讓文字過長時自動換行 */
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <h1 class="mb-4">Basic Typewriter (ex#5)</h1>
        <p class="text-muted">功能：直接打字輸入、Backspace 刪除、Esc 清空</p>
        
        <div id="container"></div>
    </div>

    <script>
        const container = document.getElementById('container');

        window.addEventListener('keyup', function(e) {
            var str = container.textContent;

            if (e.key === 'Escape') {
                container.textContent = "";
            } 
            else if (e.key === 'Backspace') {
                container.textContent = str.substring(0, str.length - 1);
            } 
            else {
                if (e.key.length === 1) {
                    container.textContent += e.key;
                }
            }
        });
    </script>
</body>
</html>
